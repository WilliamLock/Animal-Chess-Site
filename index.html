<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鬥獸棋 Classic</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #243c35;
      --muted: #5f756c;
      --paper: #fff9ea;
      --leaf: #dff4e4;
      --accent: #d59a45;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, var(--paper), var(--leaf));
      min-height: 100vh;
    }
    main {
      box-sizing: border-box;
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    h1 {
      font-size: clamp(2.3rem, 8vw, 5rem);
      line-height: 1;
      margin: 0 0 18px;
    }
    p {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.6;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }
    a {
      color: var(--ink);
      font-weight: 700;
    }
    nav a {
      border: 2px solid color-mix(in srgb, var(--accent), white 45%);
      border-radius: 999px;
      padding: 12px 18px;
      text-decoration: none;
      background: rgb(255 255 255 / 0.55);
    }
  </style>
</head>
<body>
  <main>
    <h1>鬥獸棋 Classic</h1>
    <p>
      A cute, polished version of the traditional Jungle Chess board game for Apple devices.
      Play against the computer or share the board in local two-player mode.
    </p>
    <nav aria-label="Support links">
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy Policy</a>
    </nav>
  </main>
</body>
</html>
